# Rhiza — Docker Compose production
# Usage : cp .env.example .env  →  éditer  →  docker compose up -d

services:

  # ── Neo4j Community ────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: rhiza-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474"   # Browser — accès local/SSH tunnel uniquement
      - "127.0.0.1:7687:7687"   # Bolt    — idem
    environment:
      NEO4J_AUTH: none   # mot de passe set via cypher-shell (supporte / dans le mdp)
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 1500m
      NEO4J_server_memory_pagecache_size: 1g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./conf/neo4j.conf:/conf/neo4j.conf:ro
      - ./schema:/import:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── PostgreSQL + PostGIS ───────────────────────────────────
  postgis:
    image: postgis/postgis:16-3.4
    container_name: rhiza-postgis
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"   # accès local uniquement
    environment:
      POSTGRES_DB: ${PG_DB:-rhiza}
      POSTGRES_USER: ${PG_USER:-rhiza}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-rhiza}"]
      interval: 30s
      timeout: 5s
      retries: 5

  # ── Backend Node.js + Fastify ──────────────────────────────
  api:
    build: ./backend
    container_name: rhiza-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEO4J_URI: bolt://rhiza-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PG_HOST: rhiza-postgis
      PG_PORT: 5432
      PG_DB: ${PG_DB:-rhiza}
      PG_USER: ${PG_USER:-rhiza}
      PG_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Caddy — reverse proxy HTTPS automatique ────────────────
  caddy:
    image: caddy:2-alpine
    container_name: rhiza-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./conf/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/srv/frontend:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      neo4j:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  pg_data:
  caddy_data:
  caddy_config:
