# Neo4j Community — Rhiza VPS (api.rhiza.ch)

# Ecouter sur toutes les interfaces (Docker)
server.default_listen_address=0.0.0.0

# Bolt — pas de TLS ici, Caddy gere le SSL en amont
server.bolt.tls_level=DISABLED

# Adresse publique bolt — les clients se connectent via SSH tunnel
# ou directement en localhost sur le VPS
server.bolt.advertised_address=localhost:7687

# Permettre l'import depuis /import (monte sur ./schema)
server.directories.import=/import

# Logs
server.directories.logs=/logs
